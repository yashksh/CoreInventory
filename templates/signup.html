<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup — CoreInventory</title>
    <meta name="description" content="Create a CoreInventory account to manage your warehouse and stock operations.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --ci-primary: #4f46e5;
            --ci-primary-hover: #4338ca;
            --ci-primary-light: rgba(79, 70, 229, 0.08);
            --ci-bg: #f0f2f5;
            --ci-card-bg: #ffffff;
            --ci-text: #1e293b;
            --ci-text-muted: #64748b;
            --ci-border: #e2e8f0;
            --ci-danger: #ef4444;
            --ci-danger-bg: #fef2f2;
            --ci-danger-border: #fecaca;
            --ci-success: #22c55e;
            --ci-success-bg: #f0fdf4;
            --ci-success-border: #bbf7d0;
            --ci-radius: 12px;
            --ci-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --ci-transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ci-bg);
            color: var(--ci-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* ── Animated background accents ──────────────────── */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 420px;
            height: 420px;
            background: var(--ci-primary);
            top: -80px;
            right: -60px;
            animation: float-blob 14s ease-in-out infinite alternate;
        }
        body::after {
            width: 340px;
            height: 340px;
            background: #a78bfa;
            bottom: -60px;
            left: -40px;
            animation: float-blob 18s ease-in-out infinite alternate-reverse;
        }
        @keyframes float-blob {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -20px) scale(1.08); }
        }

        /* ── Signup card ─────────────────────────────────── */
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: var(--ci-card-bg);
            border: 1px solid var(--ci-border);
            border-radius: var(--ci-radius);
            box-shadow: var(--ci-shadow);
            padding: 2.5rem 2rem 2rem;
            animation: card-enter 0.45s ease-out;
        }
        @keyframes card-enter {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Brand header ────────────────────────────────── */
        .brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .brand-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--ci-primary), #7c3aed);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .brand h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .brand p {
            font-size: 0.88rem;
            color: var(--ci-text-muted);
        }

        /* ── Flash / error alert ─────────────────────────── */
        .alert-login {
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 0.65rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.35s ease;
        }
        .alert-danger-custom {
            background: var(--ci-danger-bg);
            color: var(--ci-danger);
            border: 1px solid var(--ci-danger-border);
        }
        .alert-success-custom {
            background: var(--ci-success-bg);
            color: var(--ci-success);
            border: 1px solid var(--ci-success-border);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%      { transform: translateX(-5px); }
            75%      { transform: translateX(5px); }
        }

        /* ── Password rules checklist ── */
        .pw-rules { list-style: none; padding: 0; margin: 0.5rem 0 0; font-size: 0.78rem; }
        .pw-rules li {
            padding: 2px 0;
            color: var(--ci-text-muted);
            transition: color 0.2s;
        }
        .pw-rules li.valid { color: var(--ci-success); }
        .pw-rules li .bi { margin-right: 4px; }

        .field-hint {
            font-size: 0.75rem;
            color: var(--ci-text-muted);
            margin-top: 0.3rem;
        }

        /* ── Form fields ─────────────────────────────────── */
        .form-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--ci-text);
            margin-bottom: 0.35rem;
        }
        .input-group {
            border: 1px solid var(--ci-border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color var(--ci-transition), box-shadow var(--ci-transition);
        }
        .input-group:focus-within {
            border-color: var(--ci-primary);
            box-shadow: 0 0 0 3px var(--ci-primary-light);
        }
        .input-group .input-icon {
            background: transparent;
            border: none;
            padding: 0 0.85rem;
            color: var(--ci-text-muted);
            font-size: 1rem;
            display: flex;
            align-items: center;
        }
        .input-group .form-control {
            border: none;
            box-shadow: none;
            padding: 0.7rem 0.5rem;
            font-size: 0.92rem;
            background: transparent;
        }
        .input-group .form-control:focus {
            box-shadow: none;
        }
        .input-group .toggle-pw {
            background: transparent;
            border: none;
            padding: 0 0.85rem;
            color: var(--ci-text-muted);
            cursor: pointer;
            transition: color var(--ci-transition);
        }
        .input-group .toggle-pw:hover {
            color: var(--ci-primary);
        }

        /* ── Submit button ───────────────────────────────── */
        .btn-login {
            width: 100%;
            padding: 0.72rem;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--ci-primary), #7c3aed);
            color: #fff;
            cursor: pointer;
            transition: transform var(--ci-transition), box-shadow var(--ci-transition);
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(79, 70, 229, 0.35);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .btn-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Footer link ─────────────────────────────────── */
        .login-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: var(--ci-text-muted);
        }
        .login-footer a {
            color: var(--ci-primary);
            font-weight: 600;
            text-decoration: none;
            transition: color var(--ci-transition);
        }
        .login-footer a:hover {
            color: var(--ci-primary-hover);
            text-decoration: underline;
        }

        /* ── Spinner ─────────────────────────────────────── */
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 2px;
        }
    </style>
</head>

<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">
                <i class="bi bi-box-seam"></i>
            </div>
            <h1>CoreInventory</h1>
            <p>Create your account</p>
        </div>

        <!-- Error message -->
        {% if error %}
        <div class="alert-login alert-danger-custom" role="alert">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Signup form -->
        <form method="POST" action="{{ url_for('auth.signup') }}" id="signupForm" novalidate>
            <!-- Login ID -->
            <div class="mb-3">
                <label for="login_id" class="form-label">Enter Login Id</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-person"></i></span>
                    <input
                        type="text"
                        class="form-control"
                        id="login_id"
                        name="login_id"
                        placeholder="Choose a unique Login ID"
                        required
                        minlength="6"
                        maxlength="12"
                        autocomplete="username"
                        value="{{ request.form.get('login_id', '') }}"
                    >
                </div>
                <div class="field-hint" id="loginIdHint">Must be 6–12 characters</div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Enter Email Id</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-envelope"></i></span>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        name="email"
                        placeholder="you@company.com"
                        required
                        autocomplete="email"
                        value="{{ request.form.get('email', '') }}"
                    >
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">Enter Password</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-lock"></i></span>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="new-password"
                    >
                    <button type="button" class="toggle-pw" aria-label="Toggle password visibility" onclick="togglePassword('password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <ul class="pw-rules" id="pwRules">
                    <li id="rule-length"><i class="bi bi-x-circle"></i> At least 8 characters</li>
                    <li id="rule-upper"><i class="bi bi-x-circle"></i> One uppercase letter</li>
                    <li id="rule-lower"><i class="bi bi-x-circle"></i> One lowercase letter</li>
                    <li id="rule-special"><i class="bi bi-x-circle"></i> One special character</li>
                </ul>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label for="confirm_password" class="form-label">Re-Enter Password</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-lock-check"></i></span>
                    <input
                        type="password"
                        class="form-control"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="••••••••"
                        required
                        autocomplete="new-password"
                    >
                    <button type="button" class="toggle-pw" aria-label="Toggle password visibility" onclick="togglePassword('confirm_password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-login" id="btnSignup">
                SIGN UP
            </button>
        </form>

        <!-- Login link -->
        <div class="login-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ── Toggle password visibility ──────────────────────
    function togglePassword(fieldId, btn) {
        const field = document.getElementById(fieldId);
        const icon = btn.querySelector('i');
        
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }

    // ── Real-time password validation ───────────────────
    const pwField = document.getElementById('password');
    const rules = {
        length:  document.getElementById('rule-length'),
        upper:   document.getElementById('rule-upper'),
        lower:   document.getElementById('rule-lower'),
        special: document.getElementById('rule-special'),
    };

    function checkRule(el, valid) {
        if (valid) {
            el.classList.add('valid');
            el.querySelector('i').className = 'bi bi-check-circle-fill';
        } else {
            el.classList.remove('valid');
            el.querySelector('i').className = 'bi bi-x-circle';
        }
    }

    pwField.addEventListener('input', () => {
        const v = pwField.value;
        checkRule(rules.length,  v.length >= 8);
        checkRule(rules.upper,   /[A-Z]/.test(v));
        checkRule(rules.lower,   /[a-z]/.test(v));
        checkRule(rules.special, /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(v));
    });

    // ── Login ID length hint ────────────────────────────
    const loginIdField = document.getElementById('login_id');
    const loginIdHint = document.getElementById('loginIdHint');

    loginIdField.addEventListener('input', () => {
        const len = loginIdField.value.trim().length;
        if (len === 0) {
            loginIdHint.textContent = 'Must be 6–12 characters';
            loginIdHint.style.color = '';
        } else if (len < 6) {
            loginIdHint.textContent = `Too short (${len}/6 min)`;
            loginIdHint.style.color = 'var(--ci-danger)';
        } else if (len > 12) {
            loginIdHint.textContent = `Too long (${len}/12 max)`;
            loginIdHint.style.color = 'var(--ci-danger)';
        } else {
            loginIdHint.textContent = `✓ ${len} characters`;
            loginIdHint.style.color = 'var(--ci-success)';
        }
    });

    // ── Submit guard ────────────────────────────────────
    const form = document.getElementById('signupForm');
    const btnSignup = document.getElementById('btnSignup');

    form.addEventListener('submit', (e) => {
        const name = document.getElementById('login_id').value.trim();
        const email = document.getElementById('email').value.trim();
        const pw = document.getElementById('password').value;
        const confirmPw = document.getElementById('confirm_password').value;

        if (!name || !email || !pw || !confirmPw) {
            e.preventDefault();
            return;
        }

        // Client-side password check
        const strongPw = pw.length >= 8 && /[A-Z]/.test(pw) && /[a-z]/.test(pw) && /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw);
        if (!strongPw) {
            e.preventDefault();
            alert('Please meet all password requirements.');
            return;
        }

        if (name.length < 6 || name.length > 12) {
            e.preventDefault();
            alert('Login ID must be between 6 and 12 characters.');
            return;
        }

        if (pw !== confirmPw) {
            e.preventDefault();
            alert('Passwords do not match.');
            return;
        }

        // Show spinner while waiting for response
        btnSignup.disabled = true;
        btnSignup.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Creating Account…';
    });
</script>

</body>
</html>
